services:
  web:
    container_name: caava-web
    image: ghcr.io/sostinewaliaula/caava-web:latest
    restart: always
    depends_on:
      - api

  admin:
    container_name: caava-admin
    image: ghcr.io/sostinewaliaula/caava-admin:latest
    restart: always
    depends_on:
      - api
      - web

  space:
    container_name: caava-space
    image: ghcr.io/sostinewaliaula/caava-space:latest
    restart: always
    depends_on:
      - api
      - web

  api:
    container_name: caava-api
    image: ghcr.io/sostinewaliaula/caava-api:latest
    restart: always
    command: ./bin/docker-entrypoint-api.sh
    env_file:
      - .env
    depends_on:
      - caava-db
      - caava-redis

  worker:
    container_name: caava-worker
    image: ghcr.io/sostinewaliaula/caava-api:latest
    restart: always
    command: ./bin/docker-entrypoint-worker.sh
    env_file:
      - .env
    depends_on:
      - api
      - caava-db
      - caava-redis

  beat-worker:
    container_name: caava-beat
    image: ghcr.io/sostinewaliaula/caava-api:latest
    restart: always
    command: ./bin/docker-entrypoint-beat.sh
    env_file:
      - .env
    depends_on:
      - api
      - caava-db
      - caava-redis

  migrator:
    container_name: caava-migrator
    image: ghcr.io/sostinewaliaula/caava-api:latest
    restart: no
    command: ./bin/docker-entrypoint-migrator.sh
    env_file:
      - .env
    depends_on:
      - caava-db
      - caava-redis

  live:
    container_name: caava-live
    image: ghcr.io/sostinewaliaula/caava-live:latest
    restart: always

  caava-db:
    container_name: caava-db
    image: postgres:15.7-alpine
    restart: always
    command: postgres -c 'max_connections=1000'
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data

  caava-redis:
    container_name: caava-redis
    image: valkey/valkey:7.2.11-alpine
    restart: always
    volumes:
      - redisdata:/data

  caava-mq:
    container_name: caava-mq
    image: rabbitmq:3.13.6-management-alpine
    restart: always
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  caava-minio:
    container_name: caava-minio
    image: minio/minio
    restart: always
    command: server /export --console-address ":9090"
    volumes:
      - uploads:/export
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}

  proxy:
    container_name: caava-proxy
    image: ghcr.io/sostinewaliaula/caava-proxy:latest
    restart: always
    ports:
      - ${LISTEN_HTTP_PORT}:80
      - ${LISTEN_HTTPS_PORT}:443
    environment:
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
      BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
    depends_on:
      - web
      - api
      - space
      - admin

volumes:
  pgdata:
  redisdata:
  uploads:
  rabbitmq_data:
